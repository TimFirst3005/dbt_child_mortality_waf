name : dbt CI

on: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation de dbt-core et dbt-duckdb
        run: pip install dbt-core dbt-duckdb

      - name: Installation des packages dbt
        run: dbt deps
        working-directory: ./child_mortality_waf

      - name: Exécution du pipeline complet
        run: dbt build --target ci
        working-directory: ./child_mortality_waf
        env:
          DBT_PROFILES_DIR: ./