version: 2

models:
  - name: dim_country
    description: "Dimension pays : attributs descriptifs stables pour les 16 pays d'Afrique de l'Ouest suivis (nom, sous-région, langue, statut d'enclavement)."
    columns:
      - name: country_code
        data_type: varchar
        description: "Clé primaire de la dimension. Code ISO3 du pays."
        data_tests:
          - unique
          - not_null

      - name: country_name
        data_type: varchar
        description: "Nom du pays"
        data_tests:
          - not_null

      - name: sub_region
        data_type: varchar
        description: "Sous-région géographique"

      - name: official_language
        data_type: varchar
        description: "Langue officielle principale"

      - name: is_landlocked
        data_type: boolean
        description: "Vrai si le pays est enclavé (sans accès à la mer)"