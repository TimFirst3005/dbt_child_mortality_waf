version: 2

models:
  - name: stg_child_mortality
    description: "Données de mortalité des moins de 5 ans, nettoyées, pour les pays d'Afrique de l'Ouest"
    columns:
      - name: country_code
        description: "Code ISO 3166-1 alpha-3 du pays"
        data_tests:
          - not_null
          
      - name: year
        description: "L'année de l'observation"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1990
              config:
                severity: warn

      - name: under5_mortality_rate
        description: "Le taux de mortalité des moins de 5 ans par 1 000 naissances vivantes"
        data_tests:
          - not_null

      - name: mortality_severity
        description: "Classification du niveau de mortalité : Modéré, Elevé, Critique"
        data_tests:
          - accepted_values:
              values: ['Modéré', 'Elevé', 'Critique']