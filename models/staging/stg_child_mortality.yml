version: 2

models:
  - name: stg_child_mortality
    description: '{{ doc("staging_layer_purpose") }}'
    columns:
      - name: country_code
        description: "Code ISO 3166-1 alpha-3 du pays"
        data_tests:
          - not_null
          
      - name: year
        description: "L'année de l'observation"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1990
              config:
                severity: warn

      - name: under5_mortality_rate
        description: '{{ doc("under5_mortality_methodology") }}'
        data_tests:
          - not_null

      - name: mortality_severity
        description: "Classification du niveau de mortalité : Modéré, Elevé, Critique"
        data_tests:
          - accepted_values:
              values: ['Modéré', 'Elevé', 'Critique']